<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- ProxyManager icon: dark rounded tile with a stylised P
       made of a node + two outbound routes (HK, JP, etc.). -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15181d"/>
      <stop offset="1" stop-color="#0b0d10"/>
    </linearGradient>
  </defs>

  <!-- Background tile -->
  <rect x="0" y="0" width="128" height="128" rx="26" fill="url(#bg)"/>
  <rect x="0" y="0" width="128" height="128" rx="26" fill="none" stroke="#2a2e36" stroke-width="2"/>

  <!-- Vertical bar of "P" -->
  <rect x="34" y="26" width="12" height="76" rx="6" fill="#5eead4"/>

  <!-- Top loop of "P" -->
  <path d="M 46 32 Q 86 32 86 56 Q 86 80 46 80" fill="none" stroke="#5eead4" stroke-width="12" stroke-linecap="round"/>

  <!-- Three route nodes branching off the P (representing regional groups). -->
  <circle cx="98" cy="40" r="6" fill="#fbbf24"/>
  <circle cx="104" cy="62" r="6" fill="#f87171"/>
  <circle cx="98" cy="84" r="6" fill="#5eead4"/>
  <line x1="86" y1="46" x2="94" y2="42" stroke="#2a2e36" stroke-width="2"/>
  <line x1="86" y1="56" x2="100" y2="62" stroke="#2a2e36" stroke-width="2"/>
  <line x1="86" y1="68" x2="94" y2="82" stroke="#2a2e36" stroke-width="2"/>
</svg>
